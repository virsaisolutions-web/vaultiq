<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Dark teal rounded background -->
  <rect width="120" height="120" rx="20" ry="20" fill="#0d1a18"/>
  <!-- Point-top hexagons, r=29, tightly packed cluster centered at 60,60 -->
  <!-- cx_left=34.9, cx_right=85.1, cy_top=38.5, cy_bot=81.5 -->
  <!-- Gold (top-left) -->
  <polygon points="34.9,9.5 59.9,23.9 59.9,52.7 34.9,67.1 9.9,52.7 9.9,23.9" fill="#F0A030"/>
  <!-- Terra cotta (top-right) -->
  <polygon points="85.1,9.5 110.1,23.9 110.1,52.7 85.1,67.1 60.1,52.7 60.1,23.9" fill="#C4653A"/>
  <!-- Maroon (bottom-center) -->
  <polygon points="60,52.5 85,66.9 85,95.7 60,110.1 35,95.7 35,66.9" fill="#7B3020"/>
  <polygon points="60,52.5 85,66.9 85,95.7 60,110.1 35,95.7 35,66.9" fill="none" stroke="#4a7070" stroke-width="2"/>
</svg>
